<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TaskFlow" />

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <link rel="manifest" href="/manifest.json" />

  <link data-trunk rel="rust" data-wasm-opt="z" />

  <link data-trunk rel="css" href="assets/main.css" />
  <link data-trunk rel="css" href="assets/tailwind.css" />

  <link data-trunk rel="copy-file" href="manifest.json" />
  <link data-trunk rel="copy-file" href="sw.js" />

  <link data-trunk rel="copy-file" href="node_modules/eruda/eruda.js" />
  <script src="/eruda.js"></script>

  <title>Identi</title>
</head>

<body>
  <div id="main"></div>
  <script>
    if ('serviceWorker' in navigator) {
      console.log("serviceWorker found");
      navigator.serviceWorker.register("/sw.js", {
        type: "module",
      }).catch((err) => {
        console.warn('Service worker registration failed:', err);
      });

      navigator.serviceWorker.ready.then(() => {
        console.log("SW ready");

        navigator.serviceWorker.addEventListener("message", (event) => {
          if (event.data?.type !== "__SW_LOG__") return;

          (console[event.data.level] || console.log)(
            `[SW] ${event.data.message}`
          );
        });
      });
    } else {
      console.warn("serviceWorker not in navigator");
    }
  </script>
</body>

</html>
